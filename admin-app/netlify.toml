[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# CORS headers for API calls to main site
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://growth4u.io"
